name: a-vibe-coded-story-organizer

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: a-vibe-coded-story-organizer_app
    restart: unless-stopped
    working_dir: /app
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_KEY=${APP_KEY}
      - DB_CONNECTION=sqlite
      - LOG_CHANNEL=stack
    ports:
      - "${APP_PORT:-80}:80"
    volumes:
      - ./database:/app/database
      - ./storage:/app/storage
    networks:
      - a-vibe-coded-story-organizer

networks:
  a-vibe-coded-story-organizer:
    driver: bridge
