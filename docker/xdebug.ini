; Xdebug is installed only in the development image (see Dockerfile.dev), so this
; file is deliberately NOT copied by the production Dockerfile.
;
; How Xdebug 3 actually connects: the container reaches OUT to your IDE, which
; listens on your host machine. Nothing needs to be published from the container
; for this to work — an `ports: 9000:9000` mapping in compose does the opposite of
; what people expect and is not required.
zend_extension=xdebug

; `debug` is what enables step debugging. The default mode is `develop`, which only
; prettifies var_dump/stack traces — with it, breakpoints are silently ignored.
xdebug.mode=debug

; Only start a debug session when the request explicitly asks for one (an
; XDEBUG_TRIGGER cookie/GET param, or the "Start Listening" browser extension).
; With `yes` instead, EVERY request and every test would try to open a connection
; back to the IDE and stall until it timed out — which makes `composer test`
; noticeably slower whenever you are not actually debugging.
xdebug.start_with_request=trigger

; Where the IDE is listening. `host.docker.internal` resolves to the host machine;
; on Linux it only exists because docker-compose.dev.yml maps it via `extra_hosts`.
xdebug.client_host=host.docker.internal

; 9003 is the Xdebug 3 default. (Xdebug 2 used 9000, which also collides with
; php-fpm's own default port — do not go back to it.)
xdebug.client_port=9003

xdebug.idekey=PHPSTORM

; Raise to 7 temporarily if a connection isn't being made and you need to see
; Xdebug's own diagnostics in the php-fpm log.
xdebug.log_level=0
